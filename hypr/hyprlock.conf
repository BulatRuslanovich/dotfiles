# Импорт цветовой схемы
source = ~/.config/hypr/colors.conf

# ============================================
# ОБЩИЕ НАСТРОЙКИ
# ============================================
general {
    hide_cursor = true
    ignore_empty_input = true
    grace = 1                        # Секунд до активации блокировки
    fractional_scaling = 2
    immediate_render = true
    disable_loading_bar = false      # Показывать прогресс загрузки
}

# ============================================
# ФОН
# ============================================
background {
    monitor =
    path = ~/.config/hypr/current_wallpaper
    color = rgb(0, 0, 0)
    
    # Blur настройки
    blur_size = 4                    # Увеличен для более мягкого эффекта
    blur_passes = 3                  # Больше проходов = качественнее blur
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# ============================================
# ПОЛЕ ВВОДА ПАРОЛЯ
# ============================================
input-field {
    monitor =
    size = 250, 50                   # Увеличена ширина
    outline_thickness = 3
    
    # Настройки точек
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    
    # Визуал
    rounding = 22
    outer_color = $source_color
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $secondary
    font_family = JetBrainsMono Nerd Font Mono
    font_size = 14
    
    # Поведение
    fade_on_empty = true
    fade_timeout = 1000
    hide_input = false
    
    # Текст
    placeholder_text = <i>Введите пароль...</i>
    fail_text = <i>$FAIL <b>(попытка $ATTEMPTS)</b></i>
    
    # Цвета состояний
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    capslock_color = rgb(255, 165, 0)
    bothlock_color = -1
    numlock_color = -1
    invert_numlock = false
    swap_font_color = true
    
    # Позиция
    position = 0, 120
    halign = center
    valign = bottom
}

# ============================================
# АНИМИРОВАННЫЙ ТЕКСТ (эффект тени)
# ============================================
# Тень (черная)
label {
    text = cmd[update:50] cat ~/.config/scripts/text_animation/scripttext 
    color = rgba(0, 0, 0, 1.0)
    font_size = 50
    font_family = JetBrainsMono Nerd Font Mono 
    position = 6, 344
    halign = center
    valign = center
}

# Средний слой (синий)
label {
    text = cmd[update:50] cat ~/.config/scripts/text_animation/scripttext
    color = rgba(69, 118, 255, 1.0)
    font_size = 50
    font_family = JetBrainsMono Nerd Font Mono 
    position = 3, 347
    halign = center
    valign = center
}

# Основной текст (белый)
label {
    text = cmd[update:50] cat ~/.config/scripts/text_animation/scripttext
    color = rgba(220, 220, 220, 1.0)
    font_size = 50
    font_family = JetBrainsMono Nerd Font Mono 
    position = 0, 350
    halign = center
    valign = center
}

# ============================================
# ПОГОДА С ФОНОМ
# ============================================
# Цветной индикатор
shape {
    color = rgba(255, 51, 105, 1.0)
    rounding = 1
    size = 5, 20
    position = 55, 40
    halign = left
    valign = bottom
}

# Фон для погоды
shape {
    color = rgba(0, 0, 0, 0.4)
    rounding = 8
    size = 321, 30
    position = 55, 35
    halign = left
    valign = bottom
}

# Текст погоды
label {
    text = cmd[update:1000] cat ~/.config/scripts/weather/weathertext
    color = rgba(240, 151, 175, 1.0)
    font_size = 10
    font_family = JetBrainsMono Nerd Font Mono 
    position = 65, 42
    halign = left
    valign = bottom
}

# ============================================
# ВРЕМЯ И ДАТА
# ============================================
# Время
label {
    text = cmd[update:1000] echo "$TIME12"
    color = rgba(200, 200, 200, 1.0)
    font_size = 55
    font_family = JetBrainsMono Nerd Font Mono 
    position = -50, 110
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

# Дата
label {
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = JetBrainsMono Nerd Font Mono 
    position = -50, 40
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

# ============================================
# АВАТАР ПОЛЬЗОВАТЕЛЯ
# ============================================
image {
    path = ~/img/face.jpg
    size = 185
    border_size = 7
    border_color = rgba(21, 21, 21, 0.6)
    position = 0, 100
    halign = center
    valign = center
}

# Имя пользователя
label {
    text = $USER 
    color = $color8
    font_size = 20
    font_family = JetBrainsMono Nerd Font Mono 
    position = 0, 200
    halign = center
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}