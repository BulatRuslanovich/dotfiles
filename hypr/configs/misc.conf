misc {
    # Отключаем лишние заставки при старте
    disable_hyprland_logo = true
    disable_splash_rendering = true

    # ===============================
    # ⚡ Производительность и плавность
    # ===============================

    # Включаем переменную частоту кадров (особенно полезно на 144Hz+)
    vfr = true

    # Альтернатива: можно использовать VRR (Variable Refresh Rate)
    #vrr = 1

    # Ускоряет рендеринг при перетаскивании/изменении размера окон
    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    # ===============================
    # 💤 Энергосбережение (если нужно для ноутбука)
    # ===============================

    # Включение DPMS при активности
    # mouse_move_enables_dpms = true
    # key_press_enables_dpms = true

    # ===============================
    # 🧠 Поведение фокуса и сессии
    # ===============================

    # Автофокус при активации окна (например, при alt-tab или запуске)
    focus_on_activate = true

    # Возврат сессии после блокировки (Hyprlock)
    allow_session_lock_restore = true

    # ===============================
    # 🖱️ Поведение мыши
    # ===============================

    # Отключить вставку по среднему клику (часто мешает)
    middle_click_paste = false
}