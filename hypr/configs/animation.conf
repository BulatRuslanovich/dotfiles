# ██╔══██╗████╗  ██║██║████╗ ████║██╔══██╗╚══██╔══╝██║██╔═══██╗████╗  ██║
# ███████║██╔██╗ ██║██║██╔████╔██║███████║   ██║   ██║██║   ██║██╔██╗ ██║
# ██╔══██║██║╚██╗██║██║██║╚██╔╝██║██╔══██║   ██║   ██║██║   ██║██║╚██╗██║
# ██║  ██║██║ ╚████║██║██║ ╚═╝ ██║██║  ██║   ██║   ██║╚██████╔╝██║ ╚████║
# ╚═╝  ╚═╝╚═╝  ╚═══╝╚═╝╚═╝     ╚═╝╚═╝  ╚═╝   ╚═╝   ╚═╝ ╚═════╝ ╚═╝  ╚═══╝
#------------------------------------------------------------------------

animations {
    enabled = true
    
    # ════════════════════════════════════════════════════════════
    # BEZIER КРИВЫЕ
    # ════════════════════════════════════════════════════════════
    # Формат: bezier = name, x1, y1, x2, y2
    # https://cubic-bezier.com/ для тестирования
    
    bezier = linear, 0.0, 0.0, 1.0, 1.0           # Линейная
    bezier = easeOutQuint, 0.22, 1, 0.36, 1       # Плавное замедление
    bezier = easeInOutCubic, 0.65, 0, 0.35, 1     # Плавное ускорение/замедление
    bezier = easeOutExpo, 0.16, 1, 0.3, 1         # Экспоненциальное замедление
    bezier = overshot, 0.05, 0.9, 0.1, 1.05       # С небольшим выходом за пределы
    bezier = wind, 0.05, 0.9, 0.1, 1.0            # Ветер (плавное)
    bezier = winIn, 0.1, 1.1, 0.1, 1.0            # Влет с упругостью
    bezier = winOut, 0.3, -0.3, 0, 1              # Вылет с отскоком
    bezier = smoothIn, 0.25, 0.1, 0.25, 1         # Плавный вход
    bezier = smoothOut, 0, 0, 0.58, 1             # Плавный выход
    
    # ════════════════════════════════════════════════════════════
    # АНИМАЦИИ ОКОН
    # ════════════════════════════════════════════════════════════
    # Формат: animation = NAME, ONOFF, SPEED, CURVE, [STYLE]
    # SPEED: 1-10 (ds * 10ms), чем меньше = быстрее
    
    # Основные окна
    animation = windows, 1, 6, easeOutExpo, slide
    animation = windowsIn, 1, 6, easeOutExpo, popin 80%
    animation = windowsOut, 1, 5, winOut, popin 80%
    animation = windowsMove, 1, 5, wind, slide
    
    # ════════════════════════════════════════════════════════════
    # АНИМАЦИИ РАМОК И ЗАТЕНЕНИЯ
    # ════════════════════════════════════════════════════════════
    animation = border, 1, 10, default
    animation = borderangle, 1, 100, linear, loop  # Вращение градиента рамки
    animation = fade, 1, 7, smoothOut              # Плавное затухание
    animation = fadeDim, 1, 7, smoothOut           # Затухание димминга
    animation = fadeSwitch, 1, 7, smoothOut        # Переключение с затуханием
    animation = fadeShadow, 1, 7, smoothOut        # Затухание теней
    
    # ════════════════════════════════════════════════════════════
    # АНИМАЦИИ РАБОЧИХ СТОЛОВ
    # ════════════════════════════════════════════════════════════
    # Стили: slide, slidevert, fade
    animation = workspaces, 1, 6, easeOutExpo, slide
    
    # Специальные воркспейсы (scratchpad и т.д.)
    animation = specialWorkspace, 1, 6, easeOutExpo, slidevert
    
    # ════════════════════════════════════════════════════════════
    # АНИМАЦИИ СЛОЕВ (уведомления, меню и т.д.)
    # ════════════════════════════════════════════════════════════
    animation = layers, 1, 5, easeOutExpo, popin 80%
    animation = layersIn, 1, 5, easeOutExpo, slide
    animation = layersOut, 1, 5, smoothOut, slide
}
