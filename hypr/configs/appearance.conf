#-----------------------------------------------------------------------------------

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    
    # Градиент от teal к blue с более яркими цветами
    col.active_border = rgba(5eead4ff) rgba(3b82f6ff) rgba(8b5cf6ff) 45deg
    col.inactive_border = rgba(1e293baa)
    
    allow_tearing = false
    layout = dwindle
    resize_on_border = true  # Изменение размера через границу
}

decoration {
    rounding = 12
    
    # Улучшенный blur
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.0117
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.0
    }
    
    # Димминг неактивных окон
    dim_inactive = false
    dim_strength = 0.05
    
    # Прозрачность
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
}


# Blur waybar
layerrule = blur, waybar
# Blur wlogout
layerrule = blur, logout_dialog
# Blur swaync
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
