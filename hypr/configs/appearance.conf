# ════════════════════════════════════════════════════════════════
# ОСНОВНЫЕ НАСТРОЙКИ
# ════════════════════════════════════════════════════════════════
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    
    # Градиент от teal к blue и purple (teal → blue → purple)
    col.active_border = rgba(5eead4ff) rgba(3b82f6ff) rgba(8b5cf6ff) 45deg
    col.inactive_border = rgba(1e293baa)
    
    # Производительность
    allow_tearing = false
    layout = dwindle
    
    # Удобство
    resize_on_border = true
    extend_border_grab_area = 15      # Увеличенная область захвата
    hover_icon_on_border = true       # Иконка при наведении на границу
}

# ════════════════════════════════════════════════════════════════
# ДЕКОРАЦИИ И ЭФФЕКТЫ
# ════════════════════════════════════════════════════════════════
decoration {
    rounding = 12
    
    # Blur эффекты
    blur {
        enabled = false
        # size = 6                      # Оптимизировано для производительности
        # passes = 2
        # new_optimizations = true
        # xray = false
        # ignore_opacity = false
        # noise = 0.0117
        # contrast = 1.05               # Слегка увеличен контраст
        # brightness = 1.0
        # vibrancy = 0.2
        # vibrancy_darkness = 0.0
        # popups = true                 # Blur для всплывающих окон
        # popups_ignorealpha = 0.2      # Игнорировать прозрачность popups
    }
    
    # Прозрачность
    # active_opacity = 1.0
    # inactive_opacity = 0.96           # Чуть менее прозрачные неактивные окна
    # fullscreen_opacity = 1.0
    
    # Димминг
    # dim_inactive = false
    # dim_strength = 0.05
    # dim_special = 0.3                 # Димминг для special workspace
    # dim_around = 0.5                  # Димминг вокруг floating окон
}

