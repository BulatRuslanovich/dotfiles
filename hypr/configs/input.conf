input {
    kb_layout = us, ru
    repeat_rate = 50
    repeat_delay = 500
    kb_options = grp:win_space_toggle

    follow_mouse = 1
    sensitivity = 0
    touchpad {
     natural_scroll = yes
     disable_while_typing = no
     middle_button_emulation = no
     drag_lock = no
     tap-to-click = yes
    }
}

