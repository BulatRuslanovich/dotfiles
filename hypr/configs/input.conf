# ════════════════════════════════════════════════════════════════
# КЛАВИАТУРА
# ════════════════════════════════════════════════════════════════
input {
    kb_layout = us,ru                     # 🇺🇸🇷🇺 Раскладки клавиатуры
    kb_options = grp:win_space_toggle     # Переключение Win+Space

    # ════════════════════════════════════════════════════════════
    # МЫШЬ И ФОКУС
    # ════════════════════════════════════════════════════════════
    follow_mouse = 1                      # Фокус следует за курсором
    mouse_refocus = true                  # Перефокусировка при наведении
    sensitivity = 0                       # Без ускорения (точное управление)
    float_switch_override_focus = 2       # Фокус всплывающих окон при переключении

    # ════════════════════════════════════════════════════════════
    # ТАЧПАД
    # ════════════════════════════════════════════════════════════
    touchpad {
        natural_scroll = true              # Естественная прокрутка (как macOS)
        disable_while_typing = true        # Отключать при наборе текста
        tap-to-click = true                # 👆 Тап = клик
        drag_lock = true                   # Удержание при перетаскивании
        middle_button_emulation = true     # Эмуляция средней кнопки
    }
}

# ════════════════════════════════════════════════════════════════
# ЖЕСТЫ
# ════════════════════════════════════════════════════════════════
gesture = 3, horizontal, workspace

