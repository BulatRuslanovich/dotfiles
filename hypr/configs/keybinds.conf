# ██║ ██╔╝██╔════╝╚██╗ ██╔╝██╔══██╗██║████╗  ██║██╔══██╗██║████╗  ██║██╔════╝ 
# █████╔╝ █████╗   ╚████╔╝ ██████╔╝██║██╔██╗ ██║██║  ██║██║██╔██╗ ██║██║  ███╗
# ██╔═██╗ ██╔══╝    ╚██╔╝  ██╔══██╗██║██║╚██╗██║██║  ██║██║██║╚██╗██║██║   ██║
# ██║  ██╗███████╗   ██║   ██████╔╝██║██║ ╚████║██████╔╝██║██║ ╚████║╚██████╔╝
# ╚═╝  ╚═╝╚══════╝   ╚═╝   ╚═════╝ ╚═╝╚═╝  ╚═══╝╚═════╝ ╚═╝╚═╝  ╚═══╝ ╚═════╝ 
#──────────────────────────────────────────────────────────────────────────────

$mainMod = SUPER

# ════════════════════════════════════════════════════════════════
# ЗАПУСК ПРИЛОЖЕНИЙ И СКРИПТОВ
# ════════════════════════════════════════════════════════════════
bind = $mainMod, H, exec, ~/.config/scripts/key_hints.sh        # Список хоткеев
bind = $mainMod, T, exec, $terminal                             # Терминал
bind = $mainMod, E, exec, $fileManager                          # Файловый менеджер
bind = $mainMod, B, exec, $browser                              # Браузер
bind = $mainMod, P, exec, amberol                              # Музыкальный плеер
bind = $mainMod, D, exec, $menu                                 # Лаунчер (Rofi/Wofi)
bind = $mainMod, L, exec, hyprlock                              # Блокировка экрана

bind = $mainMod, C, exec, ~/.config/scripts/wifi-menu.sh        # Wi-Fi меню
bind = $mainMod SHIFT, C, exec, ~/.config/scripts/clipboard_launcher.sh  # Буфер обмена

bind = $mainMod SHIFT, H, exec, ~/.config/scripts/launch_widgets.sh      # Виджеты

bind = $mainMod, W, exec, ~/.config/scripts/change_wallpaper.sh          # Смена обоев
bind = $mainMod SHIFT, W, exec, ~/.config/scripts/select_wallpaper.sh    # Выбор обоев
bind = $mainMod SHIFT, Q, exec, wlogout -b 4                             # Меню выхода
# Waybar controls
bind = $mainMod, R, exec, pkill -SIGUSR1 waybar

# Снимок всего экрана (в буфер обмена + файл)
bind = , Print, exec, grim ~/screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png && grim - | wl-copy

# Снимок активного окна (в буфер обмена + файл)
bind = SUPER, Print, exec, hyprshot -m window -o ~/screenshots && hyprshot -m window -c

# Снимок выделенной области (в буфер обмена + файл)
bind = SHIFT, Print, exec, bash -c 'REGION=$(slurp); grim -g "$REGION" ~/screenshots/region-$(date +%Y%m%d-%H%M%S).png && grim -g "$REGION" - | wl-copy'  

# ════════════════════════════════════════════════════════════════
# УПРАВЛЕНИЕ ОКНАМИ
# ════════════════════════════════════════════════════════════════
bind = $mainMod, Q, killactive,                                # Закрыть окно
bind = $mainMod, F, togglefloating,                            # Переключить режим float
bind = $mainMod, P, pseudo,                                    # Разделение контейнера
bind = $mainMod, J, togglesplit,                               # Гор./верт. разделение

# ════════════════════════════════════════════════════════════════
# ПЕРЕМЕЩЕНИЕ ФОКУСА
# ════════════════════════════════════════════════════════════════
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ════════════════════════════════════════════════════════════════
# ПЕРЕМЕЩЕНИЕ ОКОН
# ════════════════════════════════════════════════════════════════
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d

# ════════════════════════════════════════════════════════════════
# ИЗМЕНЕНИЕ РАЗМЕРА ОКОН
# ════════════════════════════════════════════════════════════════
binde = $mainMod SHIFT, left,  resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive,  50 0
binde = $mainMod SHIFT, up,    resizeactive,  0 -50
binde = $mainMod SHIFT, down,  resizeactive,  0 50

# ════════════════════════════════════════════════════════════════
# РАБОЧИЕ ПРОСТРАНСТВА (WORKSPACES)
# ════════════════════════════════════════════════════════════════
# Переключение
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Перемещение окон по рабочим пространствам
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Прокрутка рабочих пространств колесом мыши
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ════════════════════════════════════════════════════════════════
# МЫШЬ: ПЕРЕМЕЩЕНИЕ И РЕСАЙЗ
# ════════════════════════════════════════════════════════════════
bindm = $mainMod, mouse:272, movewindow      # ЛКМ — перемещение
bindm = $mainMod, mouse:273, resizewindow    # ПКМ — изменение размера

# ════════════════════════════════════════════════════════════════
# МУЛЬТИМЕДИА
# ════════════════════════════════════════════════════════════════
# Громкость
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
binde = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Яркость
bind = , F9,  exec, brightnessctl -q s 10%-
bind = , F10, exec, brightnessctl -q s +10%

# Управление плеером (через playerctl)
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
