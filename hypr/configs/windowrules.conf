# ════════════════════════════════════════════════════════════════
# ПРАВИЛА ДЛЯ ОКОН (Window Rules)
# ════════════════════════════════════════════════════════════════
# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Disable blur for floating XWayland window
windowrule = noblur, xwayland:1, floating:1


# VSCode - отключить блюр для производительности
windowrulev2 = noblur, class:^(Code)$

# Brave Browser - оптимизация
windowrulev2 = noblur, class:^(Brave-browser)$
windowrulev2 = opacity 1.0 override 0.98 override, class:^(Brave-browser)$
windowrulev2 = noshadow, class:^(Brave-browser)$, floating:0
windowrulev2 = rounding 12, class:^(Brave-browser)$

# Brave DevTools - полная непрозрачность
windowrulev2 = opacity 1.0 override 1.0 override, class:^(Brave-browser)$, title:^(DevTools)(.*)$
windowrulev2 = float, class:^(Brave-browser)$, title:^(DevTools)(.*)$

# Kitty Terminal - красивая прозрачность
windowrulev2 = opacity 0.92 override 0.88 override, class:^(kitty)$
windowrulev2 = rounding 12, class:^(kitty)$

# Floating окна - улучшенные эффекты
windowrulev2 = rounding 12, floating:1

# Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = opacity 1.0 override 1.0 override, title:^(Picture-in-Picture)$
windowrulev2 = size 640 360, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-660 100%-400, title:^(Picture-in-Picture)$

# Диалоговые окна
windowrulev2 = float, class:^(.*)(dialog|Dialog)(.*)$
windowrulev2 = center, class:^(.*)(dialog|Dialog)(.*)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(.*)(dialog|Dialog)(.*)$

# File pickers
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save File)(.*)$
windowrulev2 = float, title:^(Select a File)(.*)$
windowrulev2 = center, title:^(Open File)(.*)$
windowrulev2 = center, title:^(Save File)(.*)$
windowrulev2 = size 70% 70%, title:^(Open File)(.*)$
windowrulev2 = size 70% 70%, title:^(Save File)(.*)$

# Amberol - плавающее окно с фиксированным размером и блюром
windowrulev2 = float, class:^(io.bassi.Amberol)$
windowrulev2 = size 660 500, class:^(io.bassi.Amberol)$
